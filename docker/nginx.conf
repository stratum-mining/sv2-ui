server {
    listen 2121;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx doesn't crash
    # when an upstream container isn't running.
    resolver 127.0.0.11 valid=10s;

    # Proxy to Node.js backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Proxy to JD Client monitoring API (port 9091)
    location /jdc-api/ {
        set $jdc http://jd_client:9091;
        rewrite ^/jdc-api/(.*)$ /api/$1 break;
        proxy_pass $jdc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to Translator Proxy monitoring API (port 9092)
    location /translator-api/ {
        set $tproxy http://tproxy:9092;
        rewrite ^/translator-api/(.*)$ /api/$1 break;
        proxy_pass $tproxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Prometheus metrics (from Translator)
    location /metrics {
        set $tproxy http://tproxy:9092;
        proxy_pass $tproxy;
        proxy_set_header Host $host;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
